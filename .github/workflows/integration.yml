
name: Integration

on:
  push:
    branches: ["main"]
  pull_request: 
    branches: ["main"]
    
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: setup bun  
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.7

      - name: install dependencies    
        run:  bun install
        
      - name: run the index file
        run: bun dev
